        - generic [ref=e736] [cursor=pointer]:
          - generic [ref=e737]: Do I need a Shopify store to use Ephermal?
          - img [ref=e738]
        - generic: Ephermal connects directly to your Shopify store via OAuth - no app store required. You install by authorising access from inside your Ephermal dashboard. Your products, pricing and store data sync instantly.
      - generic [ref=e740]:
        - generic [ref=e741] [cursor=pointer]:
          - generic [ref=e742]: How does the UGC ad generation work?
          - img [ref=e743]
        - generic: Our AI analyses your products and brand, then uses the Ephermal UGC Engine to generate authentic creator-style video and image ads. These are real UGC-style creatives - not templates or stock footage. You review and approve before anything goes live.
      - generic [ref=e745]:
        - generic [ref=e746] [cursor=pointer]:
          - generic [ref=e747]: Which ad platforms does Ephermal support?
          - img [ref=e748]
        - generic: Ephermal fully supports Meta Ads - including Facebook and Instagram Feed, Stories, and Reels. Campaigns are created and managed via Meta's official Ads API. Everything runs from a single dashboard.
      - generic [ref=e750]:
        - generic [ref=e751] [cursor=pointer]:
          - generic [ref=e752]: Can I approve creatives before they launch?
          - img [ref=e753]
        - generic: Yes - every creative generated by Ephermal goes through your approval queue first. You can approve, reject, or request a regeneration before anything is published to your ad accounts. You stay in full control.
      - generic [ref=e755]:
        - generic [ref=e756] [cursor=pointer]:
          - generic [ref=e757]: What happens if my ad underperforms?
          - img [ref=e758]
        - generic: Ephermal's closed-loop optimization automatically detects underperforming ads and regenerates new creatives to replace them. It learns what works for your store over time and compounds performance - the longer you run it, the smarter it gets.
      - generic [ref=e760]:
        - generic [ref=e761] [cursor=pointer]:
