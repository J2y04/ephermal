<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Ephermal</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#08080c;color:#eef0f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Helvetica,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .container{text-align:center;max-width:480px}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:48px}
    .logo img{width:36px;height:36px;border-radius:9px}
    .logo span{font-size:20px;font-weight:800;color:#eef0f7;letter-spacing:-.4px}
    .code{font-size:120px;font-weight:900;line-height:1;color:#06d6c7;margin-bottom:16px}
    h1{font-size:24px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px}
    p{font-size:15px;color:#8892b0;line-height:1.65;margin-bottom:36px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#06d6c7;border:none;border-radius:12px;color:#08080c;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(6,214,199,.35)}
    .btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#8892b0;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-secondary:hover{background:rgba(255,255,255,0.08);color:#f0f2ff}
    .grid{position:fixed;inset:0;background-image:linear-gradient(rgba(6,214,199,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,214,199,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    .content{position:relative;z-index:1}
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="container content">
    <div class="logo">
      <img src="/ephermal.png" alt="Ephermal">
      <span>Ephermal</span>
    </div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or was moved. Head back to the dashboard and keep scaling your ads.</p>
    <div class="actions">
      <a href="/dashboard.html" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Go to Dashboard
      </a>
      <a href="/" class="btn-secondary">
        ← Home
      </a>
    </div>
  </div>
</body>
</html>
