<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ephermal - Create Account</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{background:#08080c;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;transition:transform 1.2s cubic-bezier(0.22,1,0.36,1)}
.blob-1{width:600px;height:600px;background:rgba(6,214,199,0.07);top:-200px;left:-200px}
.blob-2{width:500px;height:500px;background:rgba(6,214,199,0.04);bottom:-150px;right:-150px}
.blob-3{width:300px;height:300px;background:rgba(6,214,199,0.06);top:50%;left:50%;transform:translate(-50%,-50%)}
.page{position:relative;z-index:1;width:100%;max-width:480px}
.logo-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:40px;opacity:0;transform:translateY(20px) scale(0.95);animation:entryUp .7s cubic-bezier(0.22,1,0.36,1) .05s both}
.logo-wrap img{width:36px;height:36px;border-radius:9px;object-fit:cover}
.logo-wrap span{font-size:20px;font-weight:800;letter-spacing:-.3px;color:#eef0f7}
.clerk-wrap{opacity:0;transform:translateY(28px);filter:blur(6px);animation:entryUp .8s cubic-bezier(0.22,1,0.36,1) .18s both}
@keyframes entryUp{to{opacity:1;transform:none;filter:blur(0)}}
.fallback-msg{background:rgba(15,15,19,0.88);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:40px;text-align:center;color:#6b7280;font-size:14px;line-height:1.8}
.fallback-msg strong{color:#eef0f7;display:block;font-size:16px;margin-bottom:10px}
.fallback-msg a{color:#06d6c7;text-decoration:none}
.loading-spinner{display:flex;align-items:center;justify-content:center;gap:10px;color:#6b7280;font-size:14px;padding:40px}
.spinner{width:20px;height:20px;border:2px solid rgba(6,214,199,0.15);border-top-color:#06d6c7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Clerk overrides */
.cl-rootBox{width:100%}
.cl-card{background:rgba(15,15,19,0.88)!important;border:1px solid rgba(255,255,255,0.07)!important;border-radius:20px!important;backdrop-filter:blur(24px)!important;-webkit-backdrop-filter:blur(24px)!important;box-shadow:0 32px 80px rgba(0,0,0,0.5)!important}
.cl-headerTitle{font-family:'Inter',sans-serif!important;font-weight:800!important;color:#eef0f7!important;font-size:22px!important;letter-spacing:-.5px!important}
.cl-headerSubtitle{font-family:'Inter',sans-serif!important;color:#6b7280!important}
.cl-formFieldLabel,.cl-formFieldLabelRow{font-family:'Inter',sans-serif!important;color:#6b7280!important;font-weight:600!important;font-size:13px!important}
.cl-formFieldInput{background:#1a1a1f!important;border:1px solid rgba(255,255,255,0.07)!important;border-radius:12px!important;color:#eef0f7!important;font-family:'Inter',sans-serif!important;font-size:15px!important;transition:border-color .2s,box-shadow .2s!important}
.cl-formFieldInput:focus{border-color:#06d6c7!important;box-shadow:0 0 0 3px rgba(6,214,199,0.12)!important}
.cl-formButtonPrimary{background:#06d6c7!important;border-radius:12px!important;font-family:'Inter',sans-serif!important;font-weight:700!important;font-size:15px!important;border:none!important;transition:all .25s!important;letter-spacing:-.1px!important;color:#08080c!important}
.cl-formButtonPrimary:hover{transform:translateY(-2px)!important;box-shadow:0 8px 32px rgba(6,214,199,0.3)!important}
.cl-footerActionLink{color:#06d6c7!important;font-family:'Inter',sans-serif!important}
.cl-footerActionLink:hover{color:#04b8aa!important}
.cl-footerActionText{color:#6b7280!important;font-family:'Inter',sans-serif!important}
.cl-dividerLine{background:rgba(255,255,255,0.07)!important}
.cl-dividerText{color:#6b7280!important;font-family:'Inter',sans-serif!important;font-size:13px!important}
.cl-socialButtonsBlockButton{background:#1a1a1f!important;border:1px solid rgba(255,255,255,0.07)!important;border-radius:12px!important;font-family:'Inter',sans-serif!important;color:#eef0f7!important;transition:all .25s!important}
.cl-socialButtonsBlockButton:hover{border-color:rgba(6,214,199,0.3)!important;background:rgba(6,214,199,0.05)!important;transform:translateY(-1px)!important}
.cl-otpCodeFieldInput{background:#1a1a1f!important;border:1px solid rgba(255,255,255,0.07)!important;color:#eef0f7!important;font-family:'Inter',sans-serif!important;border-radius:10px!important}
.cl-alternativeMethodsBlockButton{background:#1a1a1f!important;border:1px solid rgba(255,255,255,0.07)!important;border-radius:10px!important;color:#eef0f7!important;font-family:'Inter',sans-serif!important}
.cl-formResendCodeLink,.cl-identityPreviewEditButton{color:#06d6c7!important;font-family:'Inter',sans-serif!important}
.cl-checkboxInput{accent-color:#06d6c7}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="blob blob-1" id="b1"></div>
<div class="blob blob-2" id="b2"></div>
<div class="blob blob-3"></div>

<div class="page">
  <div class="logo-wrap">
    <img src="/ephermal.png" alt="Ephermal" onerror="this.style.display='none'">
    <span>Ephermal</span>
  </div>
  <div class="clerk-wrap">
    <div id="clerk-sign-up">
      <div class="loading-spinner"><div class="spinner"></div>Loading...</div>
    </div>
  </div>
</div>

<script>
// ── Rate limiter (client-side guard) ─────────────────────────────────────────
const _rl = {};
function rateCheck(key, max) {
  const now = Date.now();
  _rl[key] = (_rl[key] || []).filter(t => now - t < 60000);
  if (_rl[key].length >= max) throw new Error('Too many attempts. Please wait a moment.');
  _rl[key].push(now);
}

// ── Parallax blobs ────────────────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  const rx = (e.clientX / window.innerWidth - 0.5) * 30;
  const ry = (e.clientY / window.innerHeight - 0.5) * 30;
  document.getElementById('b1').style.transform = `translate(${rx * 0.6}px, ${ry * 0.6}px)`;
  document.getElementById('b2').style.transform = `translate(${-rx * 0.4}px, ${-ry * 0.4}px)`;
});

// ── Particles ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
class P {
  constructor() { this.reset(); }
  reset() { this.x = Math.random() * W; this.y = Math.random() * H; this.vx = (Math.random() - .5) * .25; this.vy = (Math.random() - .5) * .25; this.r = Math.random() * 1.2 + .3; this.a = Math.random() * .35 + .08; this.c = Math.random() > .5 ? '6,214,199' : '4,184,170'; }
  update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset(); }
  draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(${this.c},${this.a})`; ctx.fill(); }
}
for (let i = 0; i < 90; i++) pts.push(new P());
function drawLines() {
  for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {
    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy);
    if (d < 110) { ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.strokeStyle = `rgba(6,214,199,${.06 * (1 - d / 110)})`; ctx.lineWidth = .5; ctx.stroke(); }
  }
}
(function animate() { ctx.clearRect(0, 0, W, H); pts.forEach(p => { p.update(); p.draw(); }); drawLines(); requestAnimationFrame(animate); })();

// ── Clerk init ────────────────────────────────────────────────────────────────
async function initClerk() {
  const el = document.getElementById('clerk-sign-up');
  try {
    rateCheck('clerk-init', 10);
    await window.Clerk.load();
    if (window.Clerk.user) { window.location.replace('/setup.html'); return; }
    window.Clerk.addListener(({ user }) => { if (user) window.location.replace('/setup.html'); });
    el.innerHTML = '';
    window.Clerk.mountSignUp(el, {
      appearance: {
        variables: {
          colorPrimary: '#06d6c7',
          colorBackground: 'rgba(15,15,19,0.88)',
          colorText: '#eef0f7',
          colorTextSecondary: '#6b7280',
          colorInputBackground: '#1a1a1f',
          colorInputText: '#eef0f7',
          colorDanger: '#f87171',
          colorSuccess: '#34d399',
          borderRadius: '12px',
          fontFamily: "'Inter', sans-serif",
        }
      },
      signInUrl: '/auth/login.html',
      afterSignUpUrl: '/setup.html',
    });
  } catch (err) {
    el.innerHTML = `<div class="fallback-msg"><strong>Could not load sign-up</strong>Check your connection and try again.<br><br><a href="/">← Back to home</a></div>`;
  }
}
</script>
<!-- Clerk publishable key is intentionally public - never put secret keys here -->
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsuZXBoZXJtYWwuYXBwJA"
  src="https://clerk.ephermal.app/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
  onload="initClerk()"
  onerror="document.getElementById('clerk-sign-up').innerHTML='<div class=\'fallback-msg\'><strong>Failed to load authentication</strong>Could not reach Clerk. Check your connection.<br><br><a href=\'/\'>← Back to home</a></div>'"
></script>
</body>
</html>
