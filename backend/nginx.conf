upstream ephermal_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name ephermal.app www.ephermal.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ephermal.app www.ephermal.app;

    ssl_certificate     /etc/letsencrypt/live/ephermal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ephermal.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 50M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Frontend (static files)
    location / {
        root /var/www/ephermal/public;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Backend API
    location /api/ {
        proxy_pass         http://ephermal_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # Webhook routes (higher timeout for Stripe/Shopify processing)
    location /api/webhooks/ {
        proxy_pass         http://ephermal_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # Media files
    location /media/ {
        alias /var/www/ephermal/media/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # n8n (internal only, not exposed publicly)
    # Access via SSH tunnel: ssh -L 5678:localhost:5678 user@server
}
