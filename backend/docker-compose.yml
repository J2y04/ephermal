version: "3.9"

services:
  api:
    build: .
    container_name: ephermal_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - /var/www/ephermal/media:/var/www/ephermal/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ephermal

  worker:
    build: .
    container_name: ephermal_worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - /var/www/ephermal/media:/var/www/ephermal/media
    depends_on:
      - redis
      - db
    networks:
      - ephermal

  db:
    image: postgres:16-alpine
    container_name: ephermal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ephermal
      POSTGRES_USER: ephermal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ephermal"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ephermal

  redis:
    image: redis:7-alpine
    container_name: ephermal_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ephermal

  n8n:
    image: n8nio/n8n:latest
    container_name: ephermal_n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://ephermal.app/n8n/
      - DB_TYPE=sqlite
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ephermal

volumes:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  ephermal:
    driver: bridge
